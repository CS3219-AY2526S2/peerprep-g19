name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/question-service/requirements.txt

      - name: Install dependencies
        run: |
          cd services/question-service
          pip install -r requirements.txt

      - name: Run Python tests
        run: |
          cd services/question-service
          pytest test_main.py -v --tb=short
        env:
          MONGO_URL: mongodb://localhost:27017

  test-node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service]
    steps:
      - uses: actions/checkout@v4

      # 1. Install pnpm first (required for the setup-node cache to work with pnpm)
      - uses: pnpm/action-setup@v3
        with:
          version: 9

      # 2. Setup Node with pnpm caching
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: services/${{ matrix.service }}/pnpm-lock.yaml

      # 3. Install and Test
      - name: Run Node Tests
        run: |
          cd services/${{ matrix.service }}
          pnpm install --no-frozen-lockfile
          pnpm test --if-present

