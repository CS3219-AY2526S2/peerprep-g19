name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/question-service/requirements.txt

      - name: Install dependencies
        run: |
          cd services/question-service
          pip install -r requirements.txt

      - name: Run Python tests
        run: |
          cd services/question-service
          pytest test_main.py -v --tb=short
        env:
          MONGO_URL: mongodb://localhost:27017
  
  test-node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service]
    steps:
      - uses: actions/checkout@v4
      
      # 1. Install pnpm first (required for the setup-node cache to work with pnpm)
      - uses: pnpm/action-setup@v3
        with:
          version: 9 # Matches current industry standards for pnpm

      # 2. Setup Node with pnpm caching
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          # Points to the service-specific lock file
          cache-dependency-path: services/${{ matrix.service }}/pnpm-lock.yaml

      # 3. Install and Test
      - name: Run Node Tests
        run: |
          cd services/${{ matrix.service }}
          pnpm install --no-frozen-lockfile
          pnpm test --if-present
  
  build-and-push:
    needs: [test-python, test-node]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
 
    permissions:
      contents: read
      packages: write
 
    steps:
      - uses: actions/checkout@v4
 
      # Recreate the Firebase service key from your secrets for the build context
      - name: Create Firebase Service Key File
        run: |
          mkdir -p services/user-service/config
          echo '${{ secrets.FIREBASE_SERVICE_KEY }}' > services/user-service/config/service_key.json
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      # Login to GitHub Container Registry using the built-in GITHUB_TOKEN
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Build and Push with Compose
        run: |
          # Set the registry namespace so Compose tags images correctly
          export GHCR_NAMESPACE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker compose build
          docker compose push
        env:
          QN_SERVICE_CLOUD_URI: ${{ secrets.QN_SERVICE_CLOUD_URI }}
 