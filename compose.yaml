services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - peerprep
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  queue-service:
    image: ${GHCR_NAMESPACE}/queue-service:latest
    build:
      context: ./services/match-service/queue-service
    networks:
      - peerprep
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MATCHING_TIMEOUT_MS: 60000
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  match-worker:
    image: ${GHCR_NAMESPACE}/match-worker:latest
    build:
      context: ./services/match-service/match-worker
    networks:
      - peerprep
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POLL_INTERVAL_MS: 1500
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  user-service:
    image: ${GHCR_NAMESPACE}/user-service:latest
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
      target: runtime
    environment:
      PORT: 3001
      FIREBASE_SERVICE_KEY: ${FIREBASE_SERVICE_KEY}
    ports:
      - "3001:3001"
    networks:
      - peerprep
    volumes:
      - ./services/user-service/config/service_key.json:/app/config/service_key.json:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  question-service:
    image: ${GHCR_NAMESPACE}/question-service:latest
    build:
      context: ./services/question-service
      dockerfile: Dockerfile
      target: runtime
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    environment:
      QN_SERVICE_CLOUD_URI: ${QN_SERVICE_CLOUD_URI}
    ports:
      - "8000:8000"
    networks:
      - peerprep
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: ${GHCR_NAMESPACE}/frontend:latest
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_USER_SERVICE_URL: ${NEXT_PUBLIC_USER_SERVICE_URL}
        NEXT_PUBLIC_QUESTION_SERVICE_URL: ${NEXT_PUBLIC_QUESTION_SERVICE_URL}
        NEXT_PUBLIC_PARTYKIT_HOST: ${NEXT_PUBLIC_PARTYKIT_HOST}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
    environment:
      NEXT_PUBLIC_USER_SERVICE_URL: ${NEXT_PUBLIC_USER_SERVICE_URL}
      NEXT_PUBLIC_QUESTION_SERVICE_URL: ${NEXT_PUBLIC_QUESTION_SERVICE_URL}
      NEXT_PUBLIC_PARTYKIT_HOST: ${NEXT_PUBLIC_PARTYKIT_HOST}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
    ports:
      - "3000:3000"
    networks:
      - peerprep
    depends_on:
      - user-service
      - question-service
    restart: unless-stopped

networks:
  peerprep:
    driver: bridge