services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks:
      - peerprep
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    networks:
      - peerprep
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
      target: runtime
    environment:
      PORT: 3001
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
    ports:
      - "3001:3001"
    networks:
      - peerprep
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  question-service:
    build:
      context: ./services/question-service
      dockerfile: Dockerfile
      target: runtime
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      QN_SERVICE_CLOUD_URI: ${QN_SERVICE_CLOUD_URI:-mongodb://mongo:27017/peerprep_db}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
    ports:
      - "8000:8000"
    networks:
      - peerprep
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  match-queue-service:
    build:
      context: ./services/match-service/queue-service
      dockerfile: dockerfile
    environment:
      PORT: 3002
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MATCHING_TIMEOUT_MS: 60000
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
    ports:
      - "3002:3002"
    networks:
      - peerprep
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3

  match-worker:
    build:
      context: ./services/match-service/match-worker
      dockerfile: dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POLL_INTERVAL_MS: 1500
    networks:
      - peerprep
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 1

  collaboration:
    build:
      context: ./services/collaboration
      dockerfile: Dockerfile
    environment:
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "1999:1999"
    networks:
      - peerprep
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    environment:
      PORT: 5050
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY}
      GOOGLE_GEMINI_MODEL: ${GOOGLE_GEMINI_MODEL}
      GOOGLE_GEMINI_TEMPERATURE: ${GOOGLE_GEMINI_TEMPERATURE}
      GOOGLE_GEMINI_MAX_TOKENS: ${GOOGLE_GEMINI_MAX_TOKENS}
      AI_MOCK_MODE: ${AI_MOCK_MODE}
      E2E_AUTH_BYPASS: ${E2E_AUTH_BYPASS}
      QUESTION_SERVICE_URL: http://question-service:8000
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
    ports:
      - "5050:5050"
    networks:
      - peerprep
    depends_on:
      - question-service
    restart: unless-stopped

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        # Server-side rewrites (baked at build time — use Docker internal hostnames)
        NEXT_PUBLIC_USER_SERVICE_URL: http://user-service:3001
        NEXT_PUBLIC_QUESTION_SERVICE_URL: http://question-service:8000
        NEXT_PUBLIC_AI_SERVICE_URL: http://ai-service:5050
        # Client-side vars (baked at build time — browser reaches these via host ports)
        NEXT_PUBLIC_MATCHING_SERVICE_URL: http://localhost:3002
        NEXT_PUBLIC_PARTYKIT_HOST: localhost:1999
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
    ports:
      - "3000:3000"
    networks:
      - peerprep
    depends_on:
      - user-service
      - question-service
      - match-queue-service
      - match-worker
      - collaboration
    restart: unless-stopped

networks:
  peerprep:
    driver: bridge

volumes:
  mongo-data: