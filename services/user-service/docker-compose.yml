services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3001}
      ENV: ${ENV:-development}
      DB_LOCAL_URI: ${DB_LOCAL_URI:-}
      DB_CLOUD_URI: ${DB_CLOUD_URI:-}
      FIREBASE_SERVICE_KEY: ${FIREBASE_SERVICE_KEY}
    restart: unless-stopped
    
