services:

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  queue-service:
    build:
      context: ./queue-service
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MATCHING_TIMEOUT_MS: 60000
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  match-worker:
    build:
      context: ./match-worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POLL_INTERVAL_MS: 1500
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure